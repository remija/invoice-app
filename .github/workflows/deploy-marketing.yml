name: Deploy Marketing

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/marketing/**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-3
  S3_BUCKET: invoice-marketing-site
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.MARKETING_CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build marketing site
        run: npx turbo build --filter=@invoice-app/marketing

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: aws s3 sync apps/marketing/out/ s3://${{ env.S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
